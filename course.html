<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DerivativesLab - FIA 401</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      background:
        radial-gradient(circle at top left, rgba(8,145,178,0.08), transparent 24%),
        linear-gradient(180deg, #eef4f8 0%, #f6f9fc 100%);
    }
    .course-shell {
      max-width: 1140px;
      margin: 0 auto;
      padding: 92px 24px 56px;
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      background: linear-gradient(140deg, #132b45 0%, #1a4c75 58%, #1371a4 100%);
      color: #fff;
      border-radius: 26px;
      padding: 28px 30px;
      box-shadow: 0 20px 48px rgba(19,43,69,0.15);
      margin-bottom: 16px;
    }
    .hero-kicker {
      display: inline-flex;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.84);
      margin-bottom: 12px;
    }
    .hero h1 {
      margin: 0 0 8px;
      font-family: 'Manrope', sans-serif;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1;
      letter-spacing: -0.05em;
    }
    .hero p {
      margin: 0;
      color: rgba(255,255,255,0.8);
      font-size: 0.98rem;
    }
    .hero-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .hero-link,
    .module-link,
    .surface-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
    }
    .hero-link {
      background: #fff;
      color: #123e67;
    }
    .hero-link.is-secondary {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.16);
    }
    .identity-panel,
    .section-card,
    .module-card,
    .surface-card {
      background: rgba(255,255,255,0.94);
      border: 1px solid rgba(21,39,68,0.08);
      box-shadow: 0 12px 28px rgba(21,39,68,0.06);
    }
    .identity-panel {
      border-radius: 20px;
      padding: 16px 18px;
      margin-bottom: 18px;
    }
    .identity-kicker {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 4px;
    }
    .identity-name {
      font-size: 1.04rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 2px;
    }
    .identity-meta {
      color: var(--text-2);
      font-size: 0.9rem;
    }
    .section {
      margin-bottom: 18px;
    }
    .section-card {
      border-radius: 24px;
      padding: 22px;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .section-head h2 {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      font-size: 1.35rem;
      letter-spacing: -0.04em;
      color: var(--navy);
    }
    .section-note {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: #e7f1fb;
      color: #1c4f7d;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .module-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .module-card {
      border-radius: 20px;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .module-copy {
      min-width: 0;
    }
    .module-card h3 {
      margin: 0 0 4px;
      font-size: 1.08rem;
      color: var(--navy);
      letter-spacing: -0.03em;
    }
    .module-meta {
      color: var(--text-2);
      font-size: 0.9rem;
    }
    .module-link,
    .surface-link {
      background: #123e67;
      color: #fff;
      white-space: nowrap;
      box-shadow: 0 10px 22px rgba(18,62,103,0.14);
    }
    .surface-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }
    .surface-card {
      border-radius: 18px;
      padding: 16px;
      text-align: center;
    }
    .surface-card h3 {
      margin: 0 0 12px;
      font-size: 1rem;
      color: var(--navy);
    }
    @media (max-width: 1024px) {
      .hero,
      .module-grid,
      .surface-grid {
        grid-template-columns: 1fr;
      }
      .hero-actions {
        justify-content: flex-start;
      }
      .surface-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 720px) {
      .course-shell {
        padding: 84px 16px 44px;
      }
      .hero,
      .section-card,
      .identity-panel {
        border-radius: 20px;
        padding: 20px;
      }
      .module-card {
        flex-direction: column;
        align-items: flex-start;
      }
      .surface-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div id="app-nav"></div>

<main class="course-shell">
  <section class="hero">
    <div>
      <div class="hero-kicker">FIA 401</div>
      <h1>Course Modules</h1>
      <p>Open a module and continue.</p>
    </div>
    <div class="hero-actions">
      <a class="hero-link" href="module1.html">Open Module 1</a>
      <a class="hero-link is-secondary" href="#module-map">Modules</a>
    </div>
  </section>

  <section class="identity-panel">
    <div class="identity-kicker">Signed In As</div>
    <div class="identity-name" id="identityName">Student</div>
    <div class="identity-meta" id="identityMeta">Institute login active</div>
  </section>

  <section class="section" id="module-map">
    <div class="section-card">
      <div class="section-head">
        <h2>Modules</h2>
        <div class="section-note">6 Modules</div>
      </div>
      <div class="module-grid" id="moduleGrid"></div>
    </div>
  </section>

  <section class="section" id="learning-surfaces">
    <div class="section-card">
      <div class="section-head">
        <h2>Sections</h2>
        <div class="section-note">Quick Access</div>
      </div>
      <div class="surface-grid">
        <article class="surface-card" id="concept-checks">
          <h3>Concept Checks</h3>
          <a class="surface-link" href="module1.html#concept-checks">Enter</a>
        </article>
        <article class="surface-card" id="quizzes">
          <h3>Quizzes</h3>
          <a class="surface-link" href="module1.html#concept-checks">Enter</a>
        </article>
        <article class="surface-card" id="simulations">
          <h3>Simulations</h3>
          <a class="surface-link" href="tools.html">Enter</a>
        </article>
        <article class="surface-card" id="games">
          <h3>Games</h3>
          <a class="surface-link" href="price-discovery.html">Enter</a>
        </article>
        <article class="surface-card" id="resources">
          <h3>Resources</h3>
          <a class="surface-link" href="#resources">Enter</a>
        </article>
      </div>
    </div>
  </section>
</main>

<script src="site-config.js"></script>
<script src="app.js"></script>
<script>
const COURSE_MODULES = [
  { title: 'Foundations of Derivatives', sessions: 'Sessions 1-3', link: 'module1.html' },
  { title: 'Futures Pricing and Basis', sessions: 'Sessions 4-5', link: 'module2.html' },
  { title: 'Options Foundations', sessions: 'Sessions 6-7', link: 'module3.html' },
  { title: 'Hedging and Risk Management', sessions: 'Sessions 8 and 15', link: 'module4.html' },
  { title: 'Options Strategies and Pricing', sessions: 'Sessions 9-14', link: 'module5.html' },
  { title: 'Greeks, Exotics, and Simulation', sessions: 'Sessions 16-20', link: 'module7.html' }
];

window.addEventListener('DOMContentLoaded', () => {
  const session = DLab.requireSession();
  if (!session) return;

  DLab.renderNav('course.html');

  document.getElementById('identityName').textContent = DLab.getStudentLabel(session);
  document.getElementById('identityMeta').textContent = session.email || 'Institute login active';

  const moduleGrid = document.getElementById('moduleGrid');
  COURSE_MODULES.forEach((module) => {
    const card = document.createElement('article');
    card.className = 'module-card';
    card.innerHTML = `
      <div class="module-copy">
        <h3>${module.title}</h3>
        <div class="module-meta">${module.sessions}</div>
      </div>
      <a class="module-link" href="${module.link}">Open Module</a>
    `;
    moduleGrid.appendChild(card);
  });

  DLab.track('HOME_OPEN', { view: 'course-compact-v1' });
});
</script>
</body>
</html>
