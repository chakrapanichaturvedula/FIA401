<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DerivativesLab — FIA 401</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }

    .login-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .login-card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(21,39,68,.10);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 440px;
      text-align: center;
    }
    .login-card::before {
      content: '';
      display: block;
      width: 48px; height: 4px;
      background: linear-gradient(90deg, var(--c1), var(--c3));
      border-radius: 2px;
      margin: 0 auto 28px;
    }

    .login-brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .login-brand-icon {
      width: 44px; height: 44px;
      background: var(--navy);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 1.3rem;
    }
    .login-brand-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -0.5px;
    }
    .login-subtitle {
      font-size: .875rem;
      color: var(--text-3);
      margin-bottom: 36px;
    }

    .login-field { text-align: left; margin-bottom: 18px; }
    .login-field label {
      display: block;
      font-size: .8125rem;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 6px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .login-field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: .9375rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      letter-spacing: .05em;
      box-sizing: border-box;
    }
    .login-field input:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(21,39,68,.10);
    }
    .login-field input::placeholder { color: var(--text-3); letter-spacing: 0; font-family: var(--font-sans); }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background .2s, transform .1s;
    }
    .login-btn:hover  { background: var(--navy-d); }
    .login-btn:active { transform: scale(.98); }
    .login-btn:disabled { opacity: .55; cursor: not-allowed; }

    .login-error {
      margin-top: 14px;
      padding: 10px 14px;
      background: #FEF0F0;
      border: 1px solid #FECACA;
      border-radius: 6px;
      color: #991B1B;
      font-size: .875rem;
      display: none;
    }
    .login-success {
      margin-top: 14px;
      padding: 10px 14px;
      background: #F0FDF4;
      border: 1px solid #BBF7D0;
      border-radius: 6px;
      color: #166534;
      font-size: .875rem;
      display: none;
    }

    .login-divider { border: none; border-top: 1px solid var(--border); margin: 28px 0 20px; }
    .instructor-link { font-size: .8125rem; color: var(--text-3); }
    .instructor-link a { color: var(--navy); font-weight: 500; text-decoration: none; }
    .instructor-link a:hover { text-decoration: underline; }

    .login-footer {
      padding: 20px;
      text-align: center;
      font-size: .8125rem;
      color: var(--text-3);
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-brand">
      <div class="login-brand-icon">◈</div>
      <span class="login-brand-name">DerivativesLab</span>
    </div>
    <p class="login-subtitle">FIA 401 Financial Derivatives · IMT Hyderabad</p>

    <div class="login-field">
      <label for="classKey">Class Key</label>
      <input type="text" id="classKey" placeholder="e.g. IMTFD26"
             autocomplete="off" spellcheck="false" />
    </div>

    <div class="login-field">
      <label for="studentId">Student ID</label>
      <input type="text" id="studentId" placeholder="e.g. 26A1HP013"
             autocomplete="off" spellcheck="false" />
    </div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">
      Enter DerivativesLab
    </button>

    <div class="login-error"   id="loginError"></div>
    <div class="login-success" id="loginSuccess">✓ Welcome! Loading your dashboard…</div>

    <hr class="login-divider" />
    <p class="instructor-link">Instructor? <a href="dashboard.html">Go to Dashboard →</a></p>

  </div>
</div>

<footer class="login-footer">
  © 2026 Dr. Chakrapani Chaturvedula · IMT Hyderabad
</footer>

<script src="app.js"></script>
<script>
const VALID_IDS_LOCAL = ['26A1HP013','26A1HP085','26A1HP153','26A3HP640','26A1HP215'];
const CLASS_KEY_LOCAL = 'IMTFD26';

window.addEventListener('DOMContentLoaded', () => {
  /* Skip login if session already exists */
  if (DLab.getSession()) { window.location.href = 'course.html'; return; }
  /* Enter key on inputs */
  ['classKey','studentId'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    })
  );
});

function doLogin() {
  const btn   = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  const okEl  = document.getElementById('loginSuccess');
  const ck    = document.getElementById('classKey').value.trim().toUpperCase();
  const sid   = document.getElementById('studentId').value.trim().toUpperCase();

  errEl.style.display = 'none';
  okEl.style.display  = 'none';

  if (!ck || !sid) { showError('Please enter both Class Key and Student ID.'); return; }
  if (ck !== CLASS_KEY_LOCAL) { showError('Invalid Class Key. Please check with your instructor.'); return; }

  // Check uploaded ID list first (set by instructor via dashboard), fall back to built-in list
  const _storedIDs = localStorage.getItem('dlabValidIDs');
  const _validIDs  = _storedIDs ? JSON.parse(_storedIDs) : VALID_IDS_LOCAL;
  if (!_validIDs.includes(sid)) { showError('Student ID not recognised. Contact your instructor if you think this is an error.'); return; }

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  DLab.saveSession(sid);

  /* Log login to gradebook (fire-and-forget JSONP) */
  DLab._callAppsScript({
    action: 'LOGIN', studentId: sid, classKey: ck,
    timestamp: new Date().toISOString(), callback: 'dlabLoginCb'
  });
  window.dlabLoginCb = () => {};

  okEl.style.display = 'block';
  setTimeout(() => { window.location.href = 'course.html'; }, 1400);
}

function showError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
