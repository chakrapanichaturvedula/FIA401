<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Module 1 - Foundations of Derivatives</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  body {
    background:
      radial-gradient(circle at top right, rgba(8,145,178,0.08), transparent 24%),
      linear-gradient(180deg, #eef4f8 0%, #f7fafc 100%);
  }
  .module-shell {
    max-width: 1140px;
    margin: 0 auto;
    padding: 92px 24px 56px;
  }
  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 18px;
    align-items: center;
    background: linear-gradient(140deg, #102f4c 0%, #174f7a 56%, #1570a6 100%);
    color: #fff;
    border-radius: 26px;
    padding: 28px 30px;
    box-shadow: 0 20px 48px rgba(16,47,76,0.15);
    margin-bottom: 18px;
  }
  .hero-kicker {
    display: inline-flex;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.84);
    margin-bottom: 12px;
  }
  .hero h1 {
    margin: 0 0 6px;
    font-family: 'Manrope', sans-serif;
    font-size: clamp(2rem, 4vw, 3rem);
    line-height: 1;
    letter-spacing: -0.05em;
  }
  .hero p {
    margin: 0;
    color: rgba(255,255,255,0.82);
    font-size: 0.98rem;
  }
  .hero-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 42px;
    padding: 0 16px;
    border-radius: 14px;
    text-decoration: none;
    font-weight: 700;
    background: #fff;
    color: #123e67;
  }
  .section {
    margin-bottom: 18px;
  }
  .section-card,
  .card {
    background: rgba(255,255,255,0.94);
    border: 1px solid rgba(21,39,68,0.08);
    box-shadow: 0 12px 28px rgba(21,39,68,0.06);
  }
  .section-card {
    border-radius: 24px;
    padding: 22px;
  }
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
  }
  .section-head h2 {
    margin: 0;
    font-family: 'Manrope', sans-serif;
    font-size: 1.35rem;
    letter-spacing: -0.04em;
    color: var(--navy);
  }
  .section-note {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 8px 12px;
    border-radius: 999px;
    background: #e7f1fb;
    color: #1c4f7d;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }
  .card {
    border-radius: 20px;
    padding: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }
  .card.locked {
    opacity: 0.68;
  }
  .card-copy {
    min-width: 0;
  }
  .card h3 {
    margin: 0 0 4px;
    font-size: 1.06rem;
    color: var(--navy);
    letter-spacing: -0.03em;
  }
  .card-meta {
    color: var(--text-2);
    font-size: 0.9rem;
  }
  .card-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 40px;
    padding: 0 15px;
    border-radius: 14px;
    text-decoration: none;
    font-weight: 700;
    background: #123e67;
    color: #fff;
    white-space: nowrap;
    box-shadow: 0 10px 22px rgba(18,62,103,0.14);
  }
  .card-link.is-muted {
    background: rgba(18,62,103,0.08);
    color: #123e67;
    box-shadow: none;
  }
  @media (max-width: 1024px) {
    .hero,
    .card-grid {
      grid-template-columns: 1fr;
    }
  }
  @media (max-width: 720px) {
    .module-shell {
      padding: 84px 16px 44px;
    }
    .hero,
    .section-card {
      border-radius: 20px;
      padding: 20px;
    }
    .card {
      flex-direction: column;
      align-items: flex-start;
    }
  }
</style>
</head>
<body>
<div id="app-nav"></div>

<main class="module-shell">
  <section class="hero">
    <div>
      <div class="hero-kicker">Module 1</div>
      <h1>Foundations of Derivatives</h1>
      <p>Sessions 1-3</p>
    </div>
    <a class="hero-link" href="s1-1.html">Open</a>
  </section>

  <section class="section" id="session-journey">
    <div class="section-card">
      <div class="section-head">
        <h2>Core Sessions</h2>
        <div class="section-note">3 Sessions</div>
      </div>
      <div class="card-grid" id="session-journey-grid"></div>
    </div>
  </section>

  <section class="section" id="bridge-pages">
    <div class="section-card">
      <div class="section-head">
        <h2>Bridge Pages</h2>
        <div class="section-note">2 Pages</div>
      </div>
      <div class="card-grid">
        <article class="card">
          <div class="card-copy">
            <h3>OTC, Exchange, Forwards, Futures</h3>
            <div class="card-meta">Before futures mechanics</div>
          </div>
          <a class="card-link is-muted" href="#bridge-pages">Open</a>
        </article>
        <article class="card" id="concept-checks">
          <div class="card-copy">
            <h3>Concept Checks</h3>
            <div class="card-meta">Module 1 checks and quiz</div>
          </div>
          <a class="card-link is-muted" href="#concept-checks">Open</a>
        </article>
      </div>
    </div>
  </section>

  <section class="section" id="practical-track">
    <div class="section-card">
      <div class="section-head">
        <h2>Futures Track</h2>
        <div class="section-note">4 Pages</div>
      </div>
      <div class="card-grid" id="futures-track-grid"></div>
    </div>
  </section>
</main>

<script src="site-config.js"></script>
<script src="app.js"></script>
<script>
(function () {
  const session = DLab.requireSession();
  if (!session) return;

  DLab.renderNav('course.html#module-map');

  const unlock = DLab.getUnlock();
  const sessionTwoOpen = !!unlock['1.2'];

  const sessionCards = [
    { title: 'Spot, Long, Short, Square Off', meta: 'Session 1.1', href: 's1-1.html', locked: false, action: 'Open' },
    { title: 'Risk, Hedging, Speculation', meta: 'Session 1.2', href: 's1-2.html', locked: !sessionTwoOpen, action: sessionTwoOpen ? 'Open' : 'Locked' },
    { title: 'Arbitrage and Trader Hats', meta: 'Session 1.3', href: '#bridge-pages', locked: false, action: 'Open' }
  ];

  const futuresTrack = [
    { title: 'Read NSE Futures Contract', meta: 'Track 1', href: '#practical-track', action: 'Enter' },
    { title: 'Open Interest and Volume', meta: 'Track 2', href: '#practical-track', action: 'Enter' },
    { title: 'Mark-to-Market P&L', meta: 'Track 3', href: '#practical-track', action: 'Enter' },
    { title: 'Margin and Margin Call', meta: 'Track 4', href: '#practical-track', action: 'Enter' }
  ];

  function renderCards(items, targetId) {
    const target = document.getElementById(targetId);
    if (!target) return;
    target.innerHTML = items.map((item) => `
      <article class="card${item.locked ? ' locked' : ''}">
        <div class="card-copy">
          <h3>${item.title}</h3>
          <div class="card-meta">${item.meta}</div>
        </div>
        <a class="card-link${item.locked ? ' is-muted' : ''}" href="${item.href}">${item.action}</a>
      </article>
    `).join('');
  }

  renderCards(sessionCards, 'session-journey-grid');
  renderCards(futuresTrack, 'futures-track-grid');

  DLab.track('MODULE_OPEN', { pageId: 'module-1-compact', module: '1' });
})();
</script>
</body>
</html>
